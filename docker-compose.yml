# ============================================================
#  Create Delight Remake v0.4.7.14 — docker-compose.yml
# ============================================================
services:
  minecraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: create-delight-remake
    image: create-delight-remake:0.4.7.14

    # ── 必须接受 EULA ──
    environment:
      EULA: "TRUE"

      # ── JVM 内存（可按服务器配置调整）──
      MEMORY_INIT: "4G"
      MEMORY_MAX: "6G"

      # ── 服务器基本配置 ──
      MOTD: "§6Create Delight Remake §fv0.4.7.14"
      MAX_PLAYERS: "20"
      DIFFICULTY: "normal"        # peaceful / easy / normal / hard
      GAMEMODE: "survival"        # survival / creative / adventure / spectator
      PVP: "true"
      ONLINE_MODE: "true"         # 改为 false 关闭正版验证（局域网/离线）
      WHITE_LIST: "false"

      # ── 世界设置 ──
      LEVEL_NAME: "world"
      LEVEL_SEED: ""              # 留空则随机种子
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "10"

      # ── RCON（远程控制台，可选）──
      RCON_ENABLED: "false"
      RCON_PORT: "25575"
      RCON_PASSWORD: "changeme"   # 启用 RCON 时请修改此密码

      # ── 时区 ──
      TZ: "Asia/Shanghai"

    ports:
      - "25565:25565"   # Minecraft 游戏端口
      # - "25575:25575" # RCON（仅在 RCON_ENABLED=true 时取消注释）

    volumes:
      # 持久化数据：存档、日志、配置、白名单等
      - ./data:/data

    # ── 重启策略 ──
    restart: unless-stopped

    # ── 资源限制（可选，避免占满宿主机）──
    # deploy:
    #   resources:
    #     limits:
    #       memory: 8G
    #       cpus: "4.0"

    # ── 停止时等待服务器保存存档（Forge 服务器需要时间）──
    stop_grace_period: 60s

    # ── 健康检查 ──
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo \"\" | timeout 5 bash -c \"cat < /dev/null > /dev/tcp/localhost/25565\" 2>/dev/null && echo healthy || exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s   # Forge 整合包启动较慢，给足时间
